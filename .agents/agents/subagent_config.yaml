agents:
  code_reviewer:
    description: "Performs deep code review on specified files"
    template: "templates/code_reviewer.md"
    token_cap: 16000
    model: "gemini-2.5-flash"  # Use a faster, cheaper model for reading
    retry_limit: 2
    output_format: "json"
    temperature: 0.0
    responseSchema: true

  researcher:
    description: "Analyzes codebase structure and documentation"
    template: "templates/researcher.md"
    token_cap: 32000
    model: "gemini-2.5-pro"    # Needs deeper reasoning
    retry_limit: 2
    output_format: "json"
    temperature: 0.0
    responseSchema: true

  auditor:
    description: "Security and performance auditing"
    template: "templates/auditor.md"
    token_cap: 16000
    model: "gemini-2.5-flash"
    retry_limit: 2
    output_format: "json"
    temperature: 0.0
    responseSchema: true

global_settings:
  max_parallel_agents: 3
  timeout_seconds: 120
  enforce_json_schema: true
